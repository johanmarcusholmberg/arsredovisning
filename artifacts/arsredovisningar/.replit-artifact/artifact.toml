kind = "web"
previewPath = "/arsredovisningar/"
title = "Årsredovisningar (v2)"
version = "1.0.0"
id = "artifacts/arsredovisningar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/arsredovisningar/" ]
localPort = 22133

[services.development]
run = "pnpm --filter @workspace/arsredovisningar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arsredovisningar", "run", "build" ]
publicDir = "artifacts/arsredovisningar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22133"
BASE_PATH = "/arsredovisningar/"
