        employeesCurrentYear: { type: integer, nullable: true }
        employeesPreviousYear: { type: integer, nullable: true }
        balanceTotalCurrentYear: { type: number, nullable: true }
        balanceTotalPreviousYear: { type: number, nullable: true }
        netRevenueCurrentYear: { type: number, nullable: true }
        netRevenuePreviousYear: { type: number, nullable: true }
