        - projectId
        - companyId
        - financialYear
        - legalForm
        - reportingFramework
        - reportType
        - isListedCompany
        - isHousingAssociation
        - voluntaryEnabled
        - largerCompanyAssessment
        - cashFlowRequirement
        - assessmentStatus
        - explanationSv
        - missingInputs
        - shouldIncludeInExport

