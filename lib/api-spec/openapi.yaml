              type: string
              nullable: true
              description: Signed upload URL stub (TODO Supabase Storage)

    ColumnMappingBody:
      type: object
      description: Column mapping for CSV/Excel imports
      properties:
        accountNumberColumn:
          type: string
          description: Column header mapped to account number (required)
        accountNameColumn:
          type: string
          nullable: true
          description: Column header mapped to account name (optional)
        openingBalanceColumn:
          type: string
          nullable: true
          description: Column header mapped to opening balance
        closingBalanceColumn:
          type: string
          nullable: true
          description: Column header mapped to closing balance
        amountColumn:
          type: string
          nullable: true
          description: Column header mapped to transaction amount
        dateColumn:
          type: string
          nullable: true
          description: Column header mapped to transaction date
        descriptionColumn:
          type: string
          nullable: true
          description: Column header mapped to description
        fileContent:
          type: string
          description: Base64-encoded file content for server-side parsing
      required:
        - accountNumberColumn
        - fileContent

    # ─── Mapping schemas ─────────────────────────────────────────────────────────

    AccountMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        accountNumber:
          type: string
        accountName:
          type: string
          nullable: true
        reportLine:
          type: string
          nullable: true
          description: K2/K3 balance sheet or income statement line key
        reportLineLabel:
          type: string
          nullable: true
          description: Swedish human-readable report line label
        basRange:
          type: string
          nullable: true
          description: BAS range used for auto-mapping (e.g. "1000-1099")
        confidence:
          type: string
          enum: [high, medium, low, unmapped]
        status:
          type: string
          enum: [auto_mapped, suggested, needs_review, manually_mapped, unmapped]
        noteImpactFlag:
          type: boolean
          description: True if this account implies a mandatory annual report note
        noteImpactMetadata:
          type: object
          nullable: true
        isManualOverride:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - batchId
        - accountNumber
        - confidence
        - status
        - noteImpactFlag
        - isManualOverride
        - createdAt
        - updatedAt

    SaveMappingOverrideBody:
      type: object
      properties:
        reportLine:
          type: string
          description: New report line key to assign
        reportLineLabel:
          type: string
          description: Swedish label for the report line
        reason:
          type: string
          nullable: true
          description: Optional explanation for the override
      required:
        - reportLine
        - reportLineLabel

    MappingAssistantAlternativeRow:
      type: object
      properties:
        reportLine:
          type: string
        reportLineLabel:
          type: string
        reason:
          type: string
      required: [reportLine, reportLineLabel, reason]

    MappingAssistantExpert:
      type: object
      properties:
        basRange:
          type: string
          nullable: true
        basGroup:
          type: string
          nullable: true
        inferredSign:
          type: string
          enum: [debit, credit, either]
        rulePriority:
          type: integer
          nullable: true
        expectedReportLine:
          type: string
          nullable: true
        notes:
          type: array
          items:
            type: string
      required: [basRange, basGroup, inferredSign, rulePriority, expectedReportLine, notes]

    MappingAssistantSuggestion:
      type: object
      description: |
        Structured per-account assistant suggestion. Stable shape: a future
        external AI provider populates the same fields without breaking
        clients.
      properties:
        accountId:
          type: string
          format: uuid
        accountNumber:
          type: string
        accountName:
          type: string
          nullable: true
        currentRowId:
          type: string
          nullable: true
        currentRowLabel:
          type: string
          nullable: true
        suggestedRowId:
          type: string
          nullable: true
        suggestedRowLabel:
          type: string
          nullable: true
        confidence:
          type: string
          enum: [low, medium, high]
        severity:
          type: string
          enum: [info, warning, blocking]
        reason:
          type: string
          description: One-sentence Swedish reason headline.
        explanation:
          type: string
          description: Plain-Swedish explanation safe to show to non-experts.
        recommendedAction:
          type: string
          enum: [keep, remap, net, review, manual_adjustment]
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/MappingAssistantAlternativeRow"
        isHighRisk:
          type: boolean
          description: |
            Surfaces in validationEngine — high-risk findings produce
            unresolved warnings that the user must review or comment on.
        source:
          type: string
          enum: [rules, ai]
        expert:
          $ref: "#/components/schemas/MappingAssistantExpert"
      required:
        - accountId
        - accountNumber
        - accountName
        - currentRowId
        - currentRowLabel
        - suggestedRowId
        - suggestedRowLabel
        - confidence
        - severity
        - reason
        - explanation
        - recommendedAction
        - alternatives
        - isHighRisk
        - source
        - expert

    MappingAssistantScanResult:
      type: object
      properties:
        total:
          type: integer
          description: Total number of mapping rows in the active confirmed batch.
        highRiskCount:
          type: integer
        warningCount:
          type: integer
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/MappingAssistantSuggestion"
      required: [total, highRiskCount, warningCount, suggestions]

    MappingTemplateEntry:
      type: object
      properties:
        accountNumber:
          type: string
        reportLine:
          type: string
        reportLineLabel:
          type: string
      required:
        - accountNumber
        - reportLine
        - reportLineLabel

    MappingTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        mappingsJson:
          type: array
          items:
            $ref: "#/components/schemas/MappingTemplateEntry"
        createdByProfileId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - mappingsJson
        - createdByProfileId
        - createdAt
        - updatedAt

    SaveMappingTemplateBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/MappingTemplateEntry"
      required:
        - name
        - mappings

    ReclassificationSuggestionStatus:
      type: string
      enum:
        - suggested
        - accepted
        - rejected
        - edited
        - not_relevant

    ReclassificationConfidenceLevel:
      type: string
      enum:
        - high
        - medium
        - low

    ReclassificationEffectType:
      type: string
      enum:
        - note_only
        - report_node_only
        - note_and_report_node

    ReclassificationStatus:
      type: string
      enum:
        - active
        - undone

    ReclassificationSuggestion:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        sourceNoteRowId:
          type: string
          format: uuid
          nullable: true
        targetNoteRowId:
          type: string
          format: uuid
          nullable: true
        sourceLabel:
          type: string
          nullable: true
        targetLabel:
          type: string
          nullable: true
        sourceAccountNumber:
          type: string
          nullable: true
        targetAccountNumber:
          type: string
          nullable: true
        suggestedAmount: { type: string }
        confidenceLevel: { $ref: "#/components/schemas/ReclassificationConfidenceLevel" }
        ruleKey: { type: string }
        explanation: { type: string }
        detailJson:
          type: object
          additionalProperties: true
          nullable: true
        effectType: { $ref: "#/components/schemas/ReclassificationEffectType" }
        status: { $ref: "#/components/schemas/ReclassificationSuggestionStatus" }
        reviewedByProfileId:
          type: string
          format: uuid
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reviewerComment:
          type: string
          nullable: true
        detectedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - suggestedAmount
        - confidenceLevel
        - ruleKey
        - explanation
        - effectType
        - status
        - detectedAt
        - createdAt
        - updatedAt

    ReclassificationSuggestionSummary:
      type: object
      properties:
        suggested: { type: integer }
        accepted: { type: integer }
        rejected: { type: integer }
        edited: { type: integer }
