        title: { type: string }
        noteTotalCurrent: { type: string, nullable: true }
        statementTotalCurrent: { type: string, nullable: true }
        differenceCurrent: { type: string, nullable: true }
        noteTotalPrevious: { type: string, nullable: true }
        statementTotalPrevious: { type: string, nullable: true }
        differencePrevious: { type: string, nullable: true }
        status:
