          type: string
          nullable: true

    CashFlowLineItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        section:
          type: string
          enum: [operating, investing, financing, reconciliation]
        lineCode: { type: string }
        labelSv: { type: string }
        amountCurrentYear: { type: number, nullable: true }
        amountPreviousYear: { type: number, nullable: true }
        sourceType:
          type: string
          enum: [mapped_accounts, calculated, manual_adjustment, imported_value]
        calculationExplanationSv:
          type: string
          nullable: true
        sourceAccounts:
          type: array
          description: |
            Source accounts that contributed to this cash-flow line. Empty when
