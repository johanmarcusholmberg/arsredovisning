          format: uuid
          nullable: true
        sourceNoteRowId:
          type: string
          format: uuid
          nullable: true
        targetNoteRowId: { type: string, format: uuid }
        sourceLabel:
          type: string
          nullable: true
        targetLabel:
          type: string
          nullable: true
        amount: { type: string }
        effectType: { $ref: "#/components/schemas/ReclassificationEffectType" }
        status: { $ref: "#/components/schemas/ReclassificationStatus" }
        reason:
          type: string
          nullable: true
        createdByProfileId:
          type: string
          format: uuid
          nullable: true
        undoneAt:
          type: string
          format: date-time
          nullable: true
        undoneByProfileId:
          type: string
          format: uuid
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - targetNoteRowId
        - amount
        - effectType
        - status
        - createdAt
        - updatedAt

    ReclassificationListResponse:
      type: object
      properties:
        reclassifications:
          type: array
          items: { $ref: "#/components/schemas/Reclassification" }
      required: [reclassifications]

    CreateReclassificationBody:
      type: object
      properties:
        sourceSuggestionId:
          type: string
          format: uuid
          nullable: true
        sourceNoteRowId:
          type: string
          format: uuid
          nullable: true
        targetNoteRowId: { type: string, format: uuid }
        sourceLabel:
          type: string
          nullable: true
        targetLabel:
          type: string
          nullable: true
        amount: { type: string }
        effectType:
          type: string
          enum: [note_only, report_node_only, note_and_report_node]
