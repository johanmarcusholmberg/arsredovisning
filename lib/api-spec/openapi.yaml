      required: [suggested, accepted, rejected, edited, notRelevant]

    ReclassificationSuggestionListResponse:
      type: object
      properties:
        suggestions:
          type: array
          items: { $ref: "#/components/schemas/ReclassificationSuggestion" }
        summary: { $ref: "#/components/schemas/ReclassificationSuggestionSummary" }
      required: [suggestions, summary]

