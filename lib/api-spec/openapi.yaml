        fsReportLine:
          type: string
          nullable: true
        fsReportLineLabel:
          type: string
          nullable: true
        classification:
          type: string
          enum:
            - cash_and_cash_equivalents
            - receivables
            - inventory
            - operating_liabilities
            - tax
            - non_cash_adjustment
            - tangible_fixed_assets
            - intangible_fixed_assets
            - financial_fixed_assets
            - long_term_loans
            - short_term_interest_bearing_loans
            - equity
            - dividends
            - other_unclear
            - exclude
        classificationSource:
          type: string
