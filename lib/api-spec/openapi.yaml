        netRevenueCurrentYear: { type: number, nullable: true }
        netRevenuePreviousYear: { type: number, nullable: true }
        thresholdEmployeesMet: { type: boolean, nullable: true }
        thresholdBalanceTotalMet: { type: boolean, nullable: true }
        thresholdNetRevenueMet: { type: boolean, nullable: true }
        largerCompanyAssessment:
          type: string
          enum: [true, false, unknown]
        cashFlowRequirement:
          type: string
          enum: [mandatory, optional, not_supported, unknown]
        assessmentStatus:
          type: string
          enum: [calculated, needs_user_confirmation, manually_overridden]
        userOverrideReason:
          type: string
          nullable: true
        explanationSv: { type: string }
        missingInputs:
          type: array
          items: { type: string }
        shouldIncludeInExport: { type: boolean }
      required:
