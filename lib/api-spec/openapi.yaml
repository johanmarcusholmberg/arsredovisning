openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Årsredovisningar
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Annual report project operations
  - name: companies
    description: Company management
  - name: reports
    description: Annual report management
  - name: dashboard
    description: Dashboard and summary data
  - name: entitlement
    description: User entitlement and access tier
  - name: notes
    description: Notes (disclosures) module
  - name: validation
    description: Compliance assistant — validation runs and dismissals
  - name: reviews
    description: Section-level review states
  - name: comments
    description: Per-section threaded comments
  - name: collaborators
    description: Per-report collaborators (invite/remove)
  - name: snapshots
    description: Point-in-time project snapshots
  - name: audit
    description: Audit/activity feed
  - name: imports
    description: Accounting data import (SIE, CSV, Excel)
  - name: mappings
    description: Account mapping and templates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Entitlement ─────────────────────────────────────────────────────────────
  /entitlement:
    get:
      operationId: getEntitlement
      tags: [entitlement]
      summary: Get the current user's entitlement tier
      description: >
        Returns the authenticated user's access tier and capabilities.
        Phase 2: all authenticated users receive "paid" tier.
        Stripe-gated entitlement is added in Phase 4.
      responses:
        "200":
          description: Entitlement info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementInfo"

  # ─── Projects ────────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List annual report projects for the authenticated user
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnualReportProject"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new annual report project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReportProject"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single annual report project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReportProject"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Companies ───────────────────────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List the authenticated user's companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}/reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of annual reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnualReport"
    post:
      operationId: createReport
      tags: [reports]
      summary: Create a new annual report
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReport"

  /reports/{reportId}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report by ID
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Annual report details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateReport
      tags: [reports]
      summary: Update report metadata
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportBody"
      responses:
        "200":
          description: Report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReport"

  /reports/{reportId}/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get report completion summary
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report completion summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Financial Statements ─────────────────────────────────────────────────

  /reports/{reportId}/financial-statements/generate:
    post:
      operationId: generateFinancialStatements
      tags: [projects]
      summary: Generate income statement and balance sheet from confirmed import data
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStatementsBody"
      responses:
        "200":
          description: Statements generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateStatementsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{reportId}/financial-statements:
    get:
      operationId: getFinancialStatements
      tags: [projects]
      summary: Get all financial statement lines for a project
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: statementType
          in: query
          required: false
          schema:
            type: string
            enum: [income_statement, balance_sheet, cash_flow]
      responses:
        "200":
          description: Financial statement lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialStatementsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{reportId}/financial-statements/lines/{lineId}:
    patch:
      operationId: updateStatementLine
      tags: [projects]
      summary: Update a statement line note reference or manual adjustment
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lineId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatementLineBody"
      responses:
        "200":
          description: Line updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialStatementLine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{reportId}/financial-statements/lines/{lineId}/drilldown:
    get:
      operationId: getStatementLineDrilldown
      tags: [projects]
      summary: Get source account detail for a statement line
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lineId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Drilldown detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementLineDrilldown"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{reportId}/financial-statements/previous-year:
    post:
      operationId: savePreviousYearValues
      tags: [projects]
      summary: Save or update previous-year amounts for statement lines
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePreviousYearBody"
      responses:
        "200":
          description: Previous-year values saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required:
                  - updated

  /reports/{reportId}/report-structure:
    get:
      operationId: getReportStructure
      tags: [projects]
      summary: Get the Swedish annual report structure for a project
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Report structure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportStructureResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{reportId}/framework:
    patch:
      operationId: updateProjectFramework
      tags: [projects]
      summary: Update the accounting framework for a project (K2 or K3)
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFrameworkBody"
      responses:
        "200":
          description: Framework updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualReportProject"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Notes ───────────────────────────────────────────────────────────────────
  /reports/{reportId}/notes:
    get:
      operationId: listReportNotes
      tags: [notes]
      summary: List all notes for a report (ordered by note_number)
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListResponse"
    post:
      operationId: createReportNote
      tags: [notes]
      summary: Create a note manually
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /reports/{reportId}/notes/{noteId}:
    patch:
      operationId: updateReportNote
      tags: [notes]
      summary: Update a note (status, text, ordering, etc.)
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteBody"
      responses:
        "200":
          description: Note updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteReportNote
      tags: [notes]
      summary: Delete a note (triggers renumbering)
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNoteResponse"

  /reports/{reportId}/notes/suggest:
    post:
      operationId: suggestReportNotes
      tags: [notes]
      summary: Run the requirement engine and upsert suggested notes
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Suggestions applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestNotesResponse"

  /reports/{reportId}/notes/recalculate-numbers:
    post:
      operationId: recalculateNoteNumbers
      tags: [notes]
      summary: Force a renumber pass for all notes on a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Renumbering completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateNumbersResponse"

  /reports/{reportId}/notes/{noteId}/accept-text:
    post:
      operationId: acceptNoteText
      tags: [notes]
      summary: Accept the suggested/AI text as the final note text
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTextBody"
      responses:
        "200":
          description: Text accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /reports/{reportId}/notes/{noteId}/rows:
    get:
      operationId: listNoteRows
      tags: [notes]
      summary: List all detail rows for a note (drilldown table)
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Note rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteRowsResponse"
    post:
      operationId: createNoteRow
      tags: [notes]
      summary: Create a manual row in a note
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRowBody"
      responses:
        "201":
          description: Row created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteRow"

  /reports/{reportId}/notes/{noteId}/rows/{rowId}:
    patch:
      operationId: updateNoteRow
      tags: [notes]
      summary: Update a note row
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: rowId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRowBody"
      responses:
        "200":
          description: Row updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteRow"
    delete:
      operationId: deleteNoteRow
      tags: [notes]
      summary: Delete a note row
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: rowId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Row deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                required: [deleted]

  /reports/{reportId}/notes/{noteId}/rows/recompute:
    post:
      operationId: recomputeNoteRows
      tags: [notes]
      summary: Re-derive non-manual rows from source accounts and statement lines
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Rows recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteRowsResponse"

  /reports/{reportId}/notes/{noteId}/confirm:
    post:
      operationId: confirmNoteText
      tags: [notes]
      summary: Confirm that the user has read and approved the note text
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: noteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed: { type: boolean }
                comment: { type: string, nullable: true }
      responses:
        "200":
          description: Confirmation recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /reports/{reportId}/notes/reconciliation:
    get:
      operationId: getNotesReconciliation
      tags: [notes]
      summary: Reconcile note totals against linked statement lines
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Reconciliation report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteReconciliationResponse"

  /reports/{reportId}/notes/{noteId}/ai-draft:
    post:
      operationId: requestNoteAiDraft
      tags: [notes]
      summary: Request an AI-generated draft text for a note
      description: >
        If an AI provider is configured, returns a Swedish-language draft
        proposal. Otherwise returns provider="not_configured" and instructions
        for the user to add an OPENAI_API_KEY. The draft is never auto-accepted.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AI draft response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiDraftResponse"

  # ─── Validation ──────────────────────────────────────────────────────────────
  /reports/{reportId}/validation/run:
    post:
      operationId: runValidation
      tags: [validation]
      summary: Run the validation engine for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Validation run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRun"

  /reports/{reportId}/validation/latest:
    get:
      operationId: getLatestValidationRun
      tags: [validation]
      summary: Get the most recent validation run for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Most recent run, or empty placeholder if none exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRun"

  /reports/{reportId}/validation/dismiss:
    post:
      operationId: dismissValidationIssue
      tags: [validation]
      summary: Dismiss (acknowledge) a warning-level validation issue
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissIssueBody"
      responses:
        "200":
          description: Dismissal recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDismissal"

  /reports/{reportId}/validation/dismissals:
    get:
      operationId: listValidationDismissals
      tags: [validation]
      summary: List active validation dismissals for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Active dismissals
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissals:
                    type: array
                    items: { $ref: "#/components/schemas/ValidationDismissal" }
                required: [dismissals]

  # ─── Reviews ─────────────────────────────────────────────────────────────────
  /reports/{reportId}/reviews:
    get:
      operationId: listSectionReviews
      tags: [reviews]
      summary: List per-section review states for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: All section reviews (auto-created if absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items: { $ref: "#/components/schemas/SectionReview" }
                required: [reviews]

  /reports/{reportId}/reviews/{section}:
    patch:
      operationId: updateSectionReview
      tags: [reviews]
      summary: Update a section's review status or assignee
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: section
          in: path
          required: true
          schema: { $ref: "#/components/schemas/ReportSection" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSectionReviewBody"
      responses:
        "200":
          description: Updated section review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionReview"

  # ─── Comments ────────────────────────────────────────────────────────────────
  /reports/{reportId}/comments:
    get:
      operationId: listSectionComments
      tags: [comments]
      summary: List comments for a report (optionally filtered by section)
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: section
          in: query
          required: false
          schema: { $ref: "#/components/schemas/ReportSection" }
      responses:
        "200":
          description: Comment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/SectionComment" }
                required: [comments]
    post:
      operationId: createSectionComment
      tags: [comments]
      summary: Create a new comment on a section
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionComment"

  /reports/{reportId}/comments/{commentId}:
    patch:
      operationId: updateSectionComment
      tags: [comments]
      summary: Resolve / unresolve a comment
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: commentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolved: { type: boolean }
              required: [resolved]
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionComment"

  # ─── Collaborators ───────────────────────────────────────────────────────────
  /reports/{reportId}/collaborators:
    get:
      operationId: listCollaborators
      tags: [collaborators]
      summary: List collaborators for a report (with role)
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Collaborator list
          content:
            application/json:
              schema:
                type: object
                properties:
                  collaborators:
                    type: array
                    items: { $ref: "#/components/schemas/Collaborator" }
                required: [collaborators]
    post:
      operationId: inviteCollaborator
      tags: [collaborators]
      summary: Invite a collaborator (placeholder — records intent, no email yet)
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCollaboratorBody"
      responses:
        "201":
          description: Invited collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"

  /reports/{reportId}/collaborators/{profileId}:
    delete:
      operationId: removeCollaborator
      tags: [collaborators]
      summary: Remove a collaborator from a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: profileId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Removed

  # ─── Snapshots ───────────────────────────────────────────────────────────────
  /reports/{reportId}/snapshots:
    get:
      operationId: listProjectSnapshots
      tags: [snapshots]
      summary: List point-in-time snapshots for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectSnapshot" }
                required: [snapshots]
    post:
      operationId: createProjectSnapshot
      tags: [snapshots]
      summary: Create a named snapshot of the current report state
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
              required: [label]
      responses:
        "201":
          description: Created snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSnapshot"

  # ─── Audit feed ──────────────────────────────────────────────────────────────
  /reports/{reportId}/audit-events:
    get:
      operationId: listAuditEvents
      tags: [audit]
      summary: List audit/activity events for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: category
          in: query
          required: false
          schema:
            type: string
            description: Optional filter (e.g. 'note', 'validation', 'export')
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEvent" }
                required: [events]

  # ─── Imports ─────────────────────────────────────────────────────────────────
  /projects/{projectId}/imports/upload:
    post:
      operationId: uploadImportFile
      tags: [imports]
      summary: Upload an accounting file (SIE, CSV, Excel) for import
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadImportFileBody"
      responses:
        "201":
          description: Upload accepted, batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatch"
        "400":
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Paid entitlement required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/imports:
    get:
      operationId: listImportBatches
      tags: [imports]
      summary: List all import batches for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of import batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportBatch"

  /projects/{projectId}/imports/{batchId}:
    get:
      operationId: getImportBatch
      tags: [imports]
      summary: Get import batch status including parsing errors and staging summary
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Import batch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatchDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/imports/{batchId}/confirm:
    post:
      operationId: confirmImportBatch
      tags: [imports]
      summary: Confirm a staging batch and promote it to project data
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Batch confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatch"
        "409":
          description: Batch not in confirmable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/imports/{batchId}/cancel:
    post:
      operationId: cancelImportBatch
      tags: [imports]
      summary: Cancel a staging batch (staging data remains but is never used)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Batch cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatch"

  /projects/{projectId}/imports/{batchId}/column-mapping:
    post:
      operationId: submitColumnMapping
      tags: [imports]
      summary: Submit column mapping for CSV/Excel imports and trigger parsing
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColumnMappingBody"
      responses:
        "200":
          description: Column mapping accepted, parsing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatch"

  /projects/{projectId}/imports/{batchId}/staging:
    get:
      operationId: getStagingPreview
      tags: [imports]
      summary: Get staging data preview for a parsed batch
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Staging preview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagingPreview"

  # ─── Mappings ─────────────────────────────────────────────────────────────────
  /projects/{projectId}/mappings:
    get:
      operationId: listAccountMappings
      tags: [mappings]
      summary: List all account mappings for the active confirmed batch
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, unmapped, low_confidence, needs_review]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of account mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountMapping"

  /projects/{projectId}/mappings/{mappingId}/override:
    post:
      operationId: saveMappingOverride
      tags: [mappings]
      summary: Save a manual mapping override for an account
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mappingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMappingOverrideBody"
      responses:
        "200":
          description: Override saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountMapping"

  /projects/{projectId}/mapping-templates:
    get:
      operationId: listMappingTemplates
      tags: [mappings]
      summary: List reusable mapping templates for the authenticated user
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of mapping templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MappingTemplate"
    post:
      operationId: saveMappingTemplate
      tags: [mappings]
      summary: Save current manual overrides as a reusable template
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMappingTemplateBody"
      responses:
        "201":
          description: Template saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MappingTemplate"

  /projects/{projectId}/mapping-templates/{templateId}/apply:
    post:
      operationId: applyMappingTemplate
      tags: [mappings]
      summary: Apply a saved template to the current batch's account mappings
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: templateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Template applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  appliedCount:
                    type: integer
                required:
                  - appliedCount

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    NotImplemented:
      type: object
      properties:
        error:
          type: string
        phase:
          type: string
      required:
        - error

    EntitlementInfo:
      type: object
      properties:
        tier:
          type: string
          enum: [demo_only, paid, subscription]
          description: "demo_only: no real projects; paid: per-report; subscription: unlimited"
        canCreateCompany:
          type: boolean
        canCreateProject:
          type: boolean
        companyCount:
          type: integer
      required:
        - tier
        - canCreateCompany
        - canCreateProject
        - companyCount

    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Company name (företagsnamn)
        orgNumber:
          type: string
          description: Swedish organization number (organisationsnummer)
        legalForm:
          type: string
          description: Legal form (AB, HB, KB, EF, etc.)
        address:
          type: string
          nullable: true
        zipCode:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        accountingFramework:
          type: string
          description: K2 or K3
          enum: [K2, K3]
        fiscalYearStart:
          type: string
          description: Fiscal year start (MM-DD, e.g. 01-01)
        fiscalYearEnd:
          type: string
          description: Fiscal year end (MM-DD, e.g. 12-31)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - orgNumber
        - legalForm
        - accountingFramework
        - fiscalYearStart
        - fiscalYearEnd
        - createdAt
        - updatedAt

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        orgNumber:
          type: string
        legalForm:
          type: string
          enum: [AB, HB, KB, EF, Ideell, Stiftelse]
          default: AB
        address:
          type: string
        zipCode:
          type: string
        city:
          type: string
        accountingFramework:
          type: string
          enum: [K2, K3]
          default: K3
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
      required:
        - name
        - orgNumber
        - legalForm
        - accountingFramework
        - fiscalYearStart
        - fiscalYearEnd

    UpdateCompanyBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        zipCode:
          type: string
        city:
          type: string
        accountingFramework:
          type: string
          enum: [K2, K3]

    AnnualReportProject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        companyName:
          type: string
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
        accountingFramework:
          type: string
          enum: [K2, K3]
        status:
          type: string
          enum: [draft, in_review, approved, exported]
        noteNumberingScheme:
          type: string
        importedSieFileName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - companyName
        - fiscalYearStart
        - fiscalYearEnd
        - accountingFramework
        - status
        - noteNumberingScheme
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
        accountingFramework:
          type: string
          enum: [K2, K3]
          default: K3
      required:
        - companyId
        - fiscalYearStart
        - fiscalYearEnd

    AnnualReport:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        companyName:
          type: string
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
        status:
          type: string
          enum: [draft, in_progress, complete, exported]
        accountingFramework:
          type: string
          enum: [K2, K3]
        completionPercent:
          type: integer
          description: Overall completion 0-100
        sectionsCompleted:
          type: integer
        sectionsTotal:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - companyName
        - fiscalYearStart
        - fiscalYearEnd
        - status
        - accountingFramework
        - completionPercent
        - sectionsCompleted
        - sectionsTotal
        - createdAt
        - updatedAt

    CreateReportBody:
      type: object
      properties:
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
        accountingFramework:
          type: string
          enum: [K2, K3]
      required:
        - fiscalYearStart
        - fiscalYearEnd
        - accountingFramework

    UpdateReportBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, in_progress, complete, exported]

    ReportSummary:
      type: object
      properties:
        reportId:
          type: string
        companyName:
          type: string
        fiscalYearStart:
          type: string
        fiscalYearEnd:
          type: string
        status:
          type: string
          enum: [draft, in_progress, complete, exported]
        completionPercent:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionStatus"
      required:
        - reportId
        - companyName
        - fiscalYearStart
        - fiscalYearEnd
        - status
        - completionPercent
        - sections

    SectionStatus:
      type: object
      properties:
        key:
          type: string
          description: "Section identifier (e.g. balance_sheet, income_statement, notes)"
        label:
          type: string
          description: Human-readable section name in Swedish
        completed:
          type: boolean
        requiredFields:
          type: integer
        completedFields:
          type: integer
      required:
        - key
        - label
        - completed
        - requiredFields
        - completedFields

    DashboardSummary:
      type: object
      properties:
        totalCompanies:
          type: integer
        totalReports:
          type: integer
        reportsInProgress:
          type: integer
        reportsComplete:
          type: integer
        recentReports:
          type: array
          items:
            $ref: "#/components/schemas/AnnualReport"
      required:
        - totalCompanies
        - totalReports
        - reportsInProgress
        - reportsComplete
        - recentReports

    FinancialStatementLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        statementType:
          type: string
          enum: [income_statement, balance_sheet, cash_flow]
        lineKey:
          type: string
        swedishLabel:
          type: string
        sortOrder:
          type: integer
        isSubtotal:
          type: boolean
        isTotal:
          type: boolean
        isHeading:
          type: boolean
        currentYearAmount:
          type: string
          nullable: true
          description: Numeric amount as string (SEK)
        previousYearAmount:
          type: string
          nullable: true
        previousYearSource:
          type: string
          nullable: true
          enum: [imported, manual, previous_report_placeholder]
        linkedAccountIds:
          type: string
          nullable: true
        calculationMethod:
          type: string
        mappingSource:
          type: string
          nullable: true
        isManuallyAdjusted:
          type: boolean
        manualAdjustmentOriginal:
          type: string
          nullable: true
        manualAdjustmentReason:
          type: string
          nullable: true
        manualAdjustmentUserId:
          type: string
          nullable: true
        manualAdjustmentAt:
          type: string
          format: date-time
          nullable: true
        framework:
          type: string
          enum: [K2, K3]
        noteReferenceText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - reportId
        - statementType
        - lineKey
        - swedishLabel
        - sortOrder
        - isSubtotal
        - isTotal
        - isHeading
        - isManuallyAdjusted
        - framework
        - calculationMethod
        - createdAt
        - updatedAt

    FinancialStatementsResponse:
      type: object
      properties:
        incomeStatement:
          type: array
          items:
            $ref: "#/components/schemas/FinancialStatementLine"
        balanceSheet:
          type: array
          items:
            $ref: "#/components/schemas/FinancialStatementLine"
        cashFlow:
          type: array
          items:
            $ref: "#/components/schemas/FinancialStatementLine"
        cashFlowRequired:
          type: boolean
        framework:
          type: string
          enum: [K2, K3]
        hasAnyLines:
          type: boolean
      required:
        - incomeStatement
        - balanceSheet
        - cashFlow
        - cashFlowRequired
        - framework
        - hasAnyLines

    GenerateStatementsBody:
      type: object
      properties:
        forceCashFlow:
          type: boolean
          description: Include cash flow lines even when not required by the framework

    GenerateStatementsResponse:
      type: object
      properties:
        generated:
          type: integer
          description: Number of lines generated
        framework:
          type: string
          enum: [K2, K3]
        noteReferencesSuggested:
          type: integer
        message:
          type: string
      required:
        - generated
        - framework
        - noteReferencesSuggested
        - message

    UpdateStatementLineBody:
      type: object
      properties:
        noteReferenceText:
          type: string
          nullable: true
        manualAdjustmentAmount:
          type: string
          nullable: true
          description: New adjusted amount (overrides system-calculated)
        manualAdjustmentReason:
          type: string
          nullable: true

    StatementLineDrilldown:
      type: object
      properties:
        lineId:
          type: string
          format: uuid
        lineKey:
          type: string
        swedishLabel:
          type: string
        calculationMethod:
          type: string
        mappingSource:
          type: string
          nullable: true
        framework:
          type: string
          nullable: true
        linkedAccountIds:
          type: string
          nullable: true
          description: Comma-separated account ranges, e.g. "3000-3999,5000-6999"
        suggestedNoteType:
          type: string
          nullable: true
        noteReferenceStatus:
          type: string
          nullable: true
        noteReferenceText:
          type: string
          nullable: true
        isManuallyAdjusted:
          type: boolean
          nullable: true
        manualAdjustmentOriginal:
          type: string
