    AiDraftResponse:
      type: object
      properties:
        draft:
          type: string
          nullable: true
        provider:
          type: string
          enum: [openai, anthropic, not_configured]
        instructions:
          type: string
          nullable: true
        noteId:
          type: string
          format: uuid
      required:
        - provider
        - noteId

    # ─── Phase 6 schemas ─────────────────────────────────────────────────────────
    ReportSection:
      type: string
      enum: [import, mapping, financial_statements, notes, validation, export]

    ValidationLevel:
      type: string
      enum: [blocking, warning, info]

    ReviewStatus:
      type: string
      enum: [not_started, in_progress, ready_for_review, changes_requested, approved]

    ReportRole:
      type: string
      enum: [owner, admin, accountant, reviewer, auditor, read_only]

    ValidationIssue:
      type: object
      properties:
        ruleKey: { type: string }
        level: { $ref: "#/components/schemas/ValidationLevel" }
        section: { $ref: "#/components/schemas/ReportSection" }
        message: { type: string }
        entityRef: { type: string, nullable: true }
        isHighRisk: { type: boolean }
        quickLinkPath: { type: string, nullable: true }
      required: [ruleKey, level, section, message, isHighRisk]

    ValidationRun:
      type: object
      properties:
        id: { type: string, format: uuid, nullable: true }
        reportId: { type: string, format: uuid }
        runByProfileId: { type: string, format: uuid, nullable: true }
        runAt: { type: string, format: date-time, nullable: true }
        blockingCount: { type: integer }
        warningCount: { type: integer }
        infoCount: { type: integer }
        issues:
          type: array
          items: { $ref: "#/components/schemas/ValidationIssue" }
        readinessLevel:
          type: string
          enum: [ready, blocked, not_run]
      required: [reportId, blockingCount, warningCount, infoCount, issues, readinessLevel]

    DismissIssueBody:
      type: object
      properties:
        issueKey: { type: string }
        comment: { type: string, nullable: true }
      required: [issueKey]

    ValidationDismissal:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        issueKey: { type: string }
        dismissedByProfileId: { type: string, format: uuid, nullable: true }
        dismissedByName: { type: string, nullable: true }
        isHighRisk: { type: boolean }
        requiresComment: { type: boolean }
        comment: { type: string, nullable: true }
        dismissedAt: { type: string, format: date-time }
      required: [id, reportId, issueKey, isHighRisk, requiresComment, dismissedAt]

    SectionReview:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        section: { $ref: "#/components/schemas/ReportSection" }
        status: { $ref: "#/components/schemas/ReviewStatus" }
        assignedToProfileId: { type: string, format: uuid, nullable: true }
        assignedToName: { type: string, nullable: true }
        updatedByProfileId: { type: string, format: uuid, nullable: true }
        updatedAt: { type: string, format: date-time }
      required: [id, reportId, section, status, updatedAt]

    UpdateSectionReviewBody:
      type: object
      properties:
        status: { $ref: "#/components/schemas/ReviewStatus" }
        assignedToProfileId: { type: string, format: uuid, nullable: true }

    SectionComment:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        section: { $ref: "#/components/schemas/ReportSection" }
        entityId: { type: string, format: uuid, nullable: true }
        body: { type: string }
        createdByProfileId: { type: string, format: uuid, nullable: true }
        createdByName: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        resolved: { type: boolean }
        resolvedByProfileId: { type: string, format: uuid, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
      required: [id, reportId, section, body, createdAt, resolved]

    CreateSectionCommentBody:
      type: object
      properties:
        section: { $ref: "#/components/schemas/ReportSection" }
        body: { type: string, minLength: 1 }
        entityId: { type: string, format: uuid, nullable: true }
      required: [section, body]

    Collaborator:
      type: object
      properties:
        profileId: { type: string, format: uuid }
        email: { type: string }
        displayName: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/ReportRole" }
        invitedByProfileId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        isOwner: { type: boolean }
      required: [profileId, email, role, isOwner, createdAt]

    InviteCollaboratorBody:
      type: object
      properties:
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/ReportRole" }
      required: [email, role]

    ProjectSnapshot:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        label: { type: string, nullable: true }
        actorProfileId: { type: string, format: uuid, nullable: true }
        actorName: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, reportId, createdAt]

    AuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        eventType: { type: string }
        actorProfileId: { type: string, format: uuid, nullable: true }
        actorName: { type: string, nullable: true }
        eventData:
          type: object
          additionalProperties: true
          nullable: true
        createdAt: { type: string, format: date-time }
      required: [id, eventType, createdAt]

    # ─── Import schemas ──────────────────────────────────────────────────────────

    UploadImportFileBody:
      type: object
      properties:
        originalFilename:
          type: string
        fileType:
          type: string
          enum: [sie, csv, excel]
        fileSizeBytes:
          type: integer
          nullable: true
        storageBucket:
          type: string
          nullable: true
        storagePath:
          type: string
          nullable: true
      required:
        - originalFilename
        - fileType

    ParsingError:
      type: object
      properties:
        section:
          type: string
          description: SIE section label or CSV/Excel row range
        message:
          type: string
          description: Human-readable error description
        severity:
          type: string
          enum: [warning, error]
      required:
        - section
        - message
        - severity

    ImportBatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        originalFilename:
          type: string
        fileType:
          type: string
          enum: [sie, csv, excel]
        fileSizeBytes:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, parsing, partial, parsed, failed, confirmed, cancelled]
        fiscalYearDetected:
          type: string
          nullable: true
        accountsFound:
          type: integer
        balancesFound:
          type: integer
        transactionsFound:
          type: integer
        parsingErrors:
          type: array
          items:
            $ref: "#/components/schemas/ParsingError"
        isDemo:
          type: boolean
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - originalFilename
        - fileType
        - status
        - accountsFound
        - balancesFound
        - transactionsFound
        - parsingErrors
        - isDemo
        - createdAt
        - updatedAt

    StagingAccountRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountNumber:
          type: string
        accountName:
          type: string
          nullable: true
        hasMissingName:
          type: boolean
        openingBalance:
          type: string
          nullable: true
        closingBalance:
          type: string
          nullable: true
        currency:
          type: string
      required:
        - id
        - accountNumber
        - hasMissingName
        - currency

    StagingPreview:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, parsing, partial, parsed, failed, confirmed, cancelled]
        fiscalYearDetected:
          type: string
          nullable: true
        accountsFound:
          type: integer
        balancesFound:
          type: integer
        transactionsFound:
          type: integer
        missingNameAccounts:
          type: integer
          description: Count of accounts with no name
        parsingErrors:
          type: array
          items:
            $ref: "#/components/schemas/ParsingError"
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/StagingAccountRow"
      required:
        - batchId
        - status
        - accountsFound
        - balancesFound
        - transactionsFound
        - missingNameAccounts
        - parsingErrors
        - accounts

    ImportBatchDetail:
      allOf:
        - $ref: "#/components/schemas/ImportBatch"
