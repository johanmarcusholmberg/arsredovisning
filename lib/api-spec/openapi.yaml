        - updated
        - renumbered
        - framework

    NoteRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        noteId: { type: string, format: uuid }
        rowKey: { type: string }
        label: { type: string }
        currentYearAmount: { type: string, nullable: true }
        previousYearAmount: { type: string, nullable: true }
        isSubtotal: { type: boolean }
        isManual: { type: boolean }
        sourceAccountRanges:
          nullable: true
          description: JSON array of account-range filters used to derive the amount
        sourceAccountIds:
          nullable: true
          description: JSON array of explicit account IDs used to derive the amount
        calculationNote: { type: string, nullable: true }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - noteId
        - rowKey
        - label
        - isSubtotal
        - isManual
        - sortOrder
        - createdAt
        - updatedAt

    NoteRowDrilldownAccount:
      type: object
      properties:
        accountNumber: { type: string }
        accountName: { type: string }
        currentYearAmount: { type: string, nullable: true }
        previousYearAmount: { type: string, nullable: true }
      required: [accountNumber, accountName]

    NoteRowsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/NoteRow"
        drilldown:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/NoteRowDrilldownAccount"
          description: Map of rowId -> source account list (for client drilldown)
      required: [rows, drilldown]

    CreateNoteRowBody:
      type: object
      properties:
        rowKey: { type: string }
        label: { type: string }
        currentYearAmount: { type: string, nullable: true }
        previousYearAmount: { type: string, nullable: true }
        isSubtotal: { type: boolean }
        sortOrder: { type: integer }
        sourceAccountRanges: {}
        calculationNote: { type: string, nullable: true }
