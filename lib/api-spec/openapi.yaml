            rather than per-account staging data.
          items:
            $ref: "#/components/schemas/CashFlowLineSourceAccount"
        isEditable: { type: boolean }
        isRequired: { type: boolean }
        isSubtotal: { type: boolean }
        needsReview: { type: boolean }
        sortOrder: { type: integer }
      required:
        - id
        - section
        - lineCode
        - labelSv
        - sourceType
        - sourceAccounts
        - isEditable
        - isRequired
        - isSubtotal
        - needsReview
        - sortOrder

